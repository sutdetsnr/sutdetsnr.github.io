<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สแกนป้ายชื่อ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root {
  --navy:      #1a237e;
  --navy-mid:  #283593;
  --navy-lite: #3949ab;
  --gold:      #f9a825;
  --gold-lite: #fdd835;
  --bg:        #eceff8;
  --card:      #ffffff;
  --text:      #1a1a2e;
  --muted:     #78909c;
  --success:   #2e7d32;
  --danger:    #c62828;
  --radius:    14px;
  --shadow:    0 4px 20px rgba(26,35,126,.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lite) 100%);
  padding: 20px 20px 28px;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -14px; left: 0; right: 0;
  height: 28px;
  background: var(--bg);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
}
.header-icon {
  width: 52px; height: 52px;
  background: rgba(255,255,255,.15);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Kanit', sans-serif;
  font-size: 1.25rem;
  color: var(--gold);
  line-height: 1.2;
}
.header p {
  font-size: 0.78rem;
  color: rgba(255,255,255,.7);
  margin-top: 2px;
}
.student-count {
  margin-left: auto;
  background: rgba(255,255,255,.15);
  border-radius: 99px;
  padding: 4px 14px;
  font-size: 0.8rem;
  color: white;
  white-space: nowrap;
  flex-shrink: 0;
}
.student-count b { color: var(--gold-lite); }

/* ── CONTAINER ── */
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-head {
  padding: 12px 16px 0;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.card-body { padding: 12px 16px 16px; }

/* ── SUBJECT INPUT ── */
.input-wrap {
  position: relative;
}
.input-wrap .ico {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 1.1rem;
  pointer-events: none;
}
.subject-input {
  width: 100%;
  padding: 12px 14px 12px 40px;
  border: 2px solid #e0e4f5;
  border-radius: 10px;
  font-family: 'Sarabun', sans-serif;
  font-size: 1rem;
  background: #f8f9ff;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  color: var(--text);
}
.subject-input:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(26,35,126,.10);
}

/* ── BUTTONS ── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  padding: 13px 10px;
  border: none;
  border-radius: 10px;
  font-family: 'Sarabun', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  display: flex; align-items: center; justify-content: center;
  gap: 7px;
  user-select: none;
}
.btn:active { transform: scale(.97); }
.btn-navy { background: var(--navy); color: #fff; }
.btn-navy:hover { background: var(--navy-mid); }
.btn-navy.active { background: var(--danger); }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { filter: brightness(.95); }

/* ── VIDEO ── */
.video-wrap {
  display: none;
  border-radius: 10px;
  overflow: hidden;
  background: #000;
  margin-top: 12px;
  position: relative;
}
.video-wrap video {
  width: 100%; display: block;
}
.btn-snap {
  position: absolute;
  bottom: 12px; left: 50%; transform: translateX(-50%);
  background: #fff;
  border: 3px solid var(--gold);
  border-radius: 50%;
  width: 60px; height: 60px;
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  transition: transform .15s;
}
.btn-snap:active { transform: translateX(-50%) scale(.9); }

/* ── PREVIEW ── */
.preview-wrap {
  display: none;
  margin-top: 12px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #e0e4f5;
  position: relative;
}
.preview-wrap img {
  width: 100%; display: block;
  max-height: 220px; object-fit: contain;
  background: #f0f0f0;
}
.preview-retake {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(255,255,255,.9);
  border: none; border-radius: 8px;
  padding: 5px 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: .85rem;
  cursor: pointer;
  font-weight: 600;
  color: var(--navy);
}

/* ── PROGRESS ── */
.progress-wrap {
  display: none;
  margin-top: 14px;
}
.progress-label {
  font-size: .85rem;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex; justify-content: space-between;
}
.progress-label span { color: var(--navy); font-weight: 700; }
.progress-bg {
  background: #e0e4f5;
  border-radius: 99px;
  height: 8px;
  overflow: hidden;
}
.progress-bar {
  background: linear-gradient(90deg, var(--navy), var(--navy-lite));
  height: 100%;
  width: 0%;
  border-radius: 99px;
  transition: width .25s ease;
}

/* ── OCR RESULT ── */
.ocr-result { display: none; }
.ocr-raw {
  background: #f5f6fc;
  border-radius: 8px;
  padding: 12px;
  font-size: .88rem;
  white-space: pre-wrap;
  color: #555;
  min-height: 50px;
  border-left: 3px solid var(--navy-lite);
  line-height: 1.7;
  word-break: break-all;
}
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.tag {
  padding: 5px 14px;
  border-radius: 99px;
  font-size: .85rem;
  font-weight: 700;
  display: flex; align-items: center; gap: 5px;
}
.tag-name   { background: #e8eaf6; color: var(--navy); }
.tag-num    { background: #fff8e1; color: #e65100; }
.tag-room   { background: #e8f5e9; color: #1b5e20; }
.tag-nomatch{ background: #ffebee; color: var(--danger); }

/* ── STATUS ── */
.status {
  text-align: center;
  font-size: .88rem;
  padding: 8px;
  border-radius: 8px;
  display: none;
  margin-top: 8px;
}
.status.info    { background: #e3f2fd; color: #1565c0; }
.status.success { background: #e8f5e9; color: var(--success); }
.status.error   { background: #ffebee; color: var(--danger); }

/* ── OCR RETRY ── */
.retry-btn {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #f5f6fc;
  border: 2px dashed #c5cae9;
  border-radius: 10px;
  color: var(--navy-lite);
  font-family: 'Sarabun', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
}

canvas { display: none; }
#fileInput { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-icon">📛</div>
    <div>
      <h1>สแกนป้ายชื่อ<br>บันทึกคะแนน</h1>
      <p>โรงเรียนศึกษานารี • สพม.กท1</p>
    </div>
    <div class="student-count" id="countBadge">โหลด...</div>
  </div>
</div>

<div class="container">

  <!-- วิชา -->
  <div class="card">
    <div class="card-head">📚 วิชา / ชีตบันทึก</div>
    <div class="card-body">
      <div class="input-wrap">
        <span class="ico">📝</span>
        <input class="subject-input" type="text" id="subjectInput"
               placeholder="ชื่อวิชา เช่น คณิตศาสตร์ 1" value="คะแนน">
      </div>
    </div>
  </div>

  <!-- กล้อง / ไฟล์ -->
  <div class="card">
    <div class="card-head">📷 ถ่ายหรือเลือกภาพป้ายชื่อ</div>
    <div class="card-body">
      <div class="btn-row">
        <button class="btn btn-navy" id="btnCamera">📷 เปิดกล้อง</button>
        <button class="btn btn-gold" id="btnFile">🖼️ เลือกรูปภาพ</button>
      </div>

      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline muted></video>
        <button class="btn-snap" id="btnSnap" title="ถ่ายภาพ">📸</button>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <img id="preview" alt="ภาพป้ายชื่อ">
        <button class="preview-retake" id="btnRetake">↺ เปลี่ยน</button>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label">
          <span id="progressText">กำลังอ่านข้อความ...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>
  </div>

  <!-- ผลลัพธ์ OCR -->
  <div class="card ocr-result" id="ocrResultCard">
    <div class="card-head">🔍 ผลการอ่าน OCR</div>
    <div class="card-body">
      <div class="ocr-raw" id="ocrRaw"></div>
      <div class="tags" id="tagsWrap"></div>
      <button class="retry-btn" id="btnManual">🔎 เลือกนักเรียนด้วยตนเอง</button>
    </div>
  </div>

  <div class="status" id="statusBar"></div>

</div>

<input type="file" id="fileInput" accept="image/*" capture="environment">
<canvas id="canvas"></canvas>

<script>
// ================================================================
//  STATE
// ================================================================
var students = [];
var cameraStream = null;
var currentStudent = null;

// ================================================================
//  CONFIG — ใส่ URL จาก GAS Deploy ตรงนี้
// ================================================================
var GAS_URL = 'https://script.google.com/a/macros/snr.ac.th/s/AKfycbzMh1tgrwhVOjl5XACjyfcnV3hIRxnqWHV9ARx5M_LUaWcRmKNS4cpYFvABmr7AaZkR/exec';

// ================================================================
//  LOAD STUDENTS
// ================================================================
function loadStudents() {
  setStatus('กำลังโหลดข้อมูลนักเรียน...', 'info');
  fetch(GAS_URL + '?action=getStudents')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        setStatus('โหลดข้อมูลไม่สำเร็จ: ' + data.error, 'error');
        document.getElementById('countBadge').textContent = '⚠ ข้อมูล';
        return;
      }
      students = data.students;
      document.getElementById('countBadge').innerHTML =
        'นักเรียน <b>' + students.length + '</b> คน';
      setStatus('พร้อมใช้งาน ✓ โหลด ' + students.length + ' คน', 'success');
      setTimeout(function() {
        document.getElementById('statusBar').style.display = 'none';
      }, 2000);
    })
    .catch(function(err) {
      setStatus('โหลดไม่สำเร็จ: ' + err.message, 'error');
      document.getElementById('countBadge').textContent = '⚠ ข้อมูล';
    });
}

// ================================================================
//  CAMERA
// ================================================================
document.getElementById('btnCamera').addEventListener('click', function() {
  if (cameraStream) { stopCamera(); return; }
  startCamera();
});

function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('เบราว์เซอร์ไม่รองรับกล้อง กรุณาใช้ปุ่ม "เลือกรูปภาพ" แทน', 'error');
    return;
  }
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  }).then(function(s) {
    cameraStream = s;
    var v = document.getElementById('video');
    v.srcObject = s;
    document.getElementById('videoWrap').style.display = 'block';
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('btnCamera').textContent = '⛔ ปิดกล้อง';
    document.getElementById('btnCamera').classList.add('active');
  }).catch(function(err) {
    setStatus('ไม่สามารถเปิดกล้องได้ (' + err.name + ') — ลองใช้ "เลือกรูปภาพ" แทน', 'error');
  });
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(function(t) { t.stop(); });
    cameraStream = null;
  }
  document.getElementById('videoWrap').style.display = 'none';
  document.getElementById('btnCamera').textContent = '📷 เปิดกล้อง';
  document.getElementById('btnCamera').classList.remove('active');
}

document.getElementById('btnSnap').addEventListener('click', function() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  stopCamera();
  showPreview(dataUrl);
  startOCR(dataUrl);
});

// ================================================================
//  FILE INPUT
// ================================================================
document.getElementById('btnFile').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    showPreview(ev.target.result);
    resetOCR();
    startOCR(ev.target.result);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

document.getElementById('btnRetake').addEventListener('click', function() {
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('ocrResultCard').style.display = 'none';
  document.getElementById('btnManual').style.display = 'none';
  document.getElementById('statusBar').style.display = 'none';
  currentStudent = null;
});

function showPreview(src) {
  document.getElementById('preview').src = src;
  document.getElementById('previewWrap').style.display = 'block';
}

// ================================================================
//  OCR
// ================================================================
function resetOCR() {
  document.getElementById('ocrResultCard').style.display = 'none';
  document.getElementById('btnManual').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('statusBar').style.display = 'none';
}

function startOCR(imageData) {
  var progressWrap = document.getElementById('progressWrap');
  var progressBar  = document.getElementById('progressBar');
  var progressText = document.getElementById('progressText');
  var progressPct  = document.getElementById('progressPct');

  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';
  progressText.textContent = 'เริ่มต้นระบบ OCR...';
  progressPct.textContent  = '0%';

  Tesseract.recognize(imageData, 'tha+eng', {
    logger: function(m) {
      if (m.status === 'loading language traineddata') {
        progressText.textContent = 'โหลดภาษาไทย... (ครั้งแรกอาจช้าหน่อย)';
        progressBar.style.width = '15%';
        progressPct.textContent  = '15%';
      } else if (m.status === 'initializing tesseract') {
        progressText.textContent = 'เริ่มต้น Tesseract...';
        progressBar.style.width = '20%';
        progressPct.textContent  = '20%';
      } else if (m.status === 'recognizing text') {
        var pct = Math.round(20 + m.progress * 80);
        progressBar.style.width  = pct + '%';
        progressPct.textContent  = pct + '%';
        progressText.textContent = 'กำลังอ่านข้อความ...';
      }
    }
  }).then(function(result) {
    progressBar.style.width  = '100%';
    progressPct.textContent  = '100%';
    progressText.textContent = 'อ่านเสร็จสิ้น ✓';
    setTimeout(function() {
      progressWrap.style.display = 'none';
    }, 800);

    var rawText = result.data.text;
    processOCRResult(rawText);
  }).catch(function(err) {
    progressWrap.style.display = 'none';
    setStatus('OCR ล้มเหลว: ' + err.message, 'error');
  });
}

// ================================================================
//  PARSE OCR TEXT
// ================================================================
function parseNameTag(text) {
  // Normalize: replace multiple spaces/tabs with single space
  var lines = text.replace(/\r/g, '').split('\n')
    .map(function(l) { return l.replace(/\s+/g, ' ').trim(); })
    .filter(function(l) { return l.length > 0; });

  var name   = '';
  var number = '';
  var room   = '';

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // เลขที่ → ดึงตัวเลข
    var numMatch = line.match(/เลขที่\s*(\d+)/);
    if (numMatch && !number) {
      number = numMatch[1];
    }

    // ม.X/X หรือ ม X/X → room = หลัง /
    var roomMatch = line.match(/ม\.?\s*\d+\s*[\/\\]\s*(\d+)/);
    if (roomMatch && !room) {
      room = roomMatch[1];
    }

    // ถ้าไม่มี / แต่มีแค่ ม.X → room อาจเป็น X
    if (!room) {
      var gradeOnly = line.match(/^ม\.?\s*(\d+)\s*$/);
      if (gradeOnly) room = gradeOnly[1];
    }

    // ชื่อ: บรรทัดที่มีอักษรไทยเป็นหลัก ไม่ใช่บรรทัดเลขที่/ม.
    if (!name && !numMatch && !line.match(/ม\.?\s*\d/) && !line.match(/^\d+$/) && line.length >= 2) {
      var thaiCount = (line.match(/[\u0E00-\u0E7F]/g) || []).length;
      if (thaiCount >= 2) {
        name = line;
      }
    }
  }

  return { name: name, number: number, room: room };
}

function processOCRResult(text) {
  // แสดง raw OCR
  var card = document.getElementById('ocrResultCard');
  card.style.display = 'block';
  document.getElementById('ocrRaw').textContent = text || '(ไม่พบข้อความ)';

  var parsed = parseNameTag(text);

  // แสดง tags
  var tagsWrap = document.getElementById('tagsWrap');
  tagsWrap.innerHTML = '';
  if (parsed.name)   tagsWrap.innerHTML += '<span class="tag tag-name">👤 ' + parsed.name + '</span>';
  if (parsed.number) tagsWrap.innerHTML += '<span class="tag tag-num">🔢 เลขที่ ' + parsed.number + '</span>';
  if (parsed.room)   tagsWrap.innerHTML += '<span class="tag tag-room">🏫 ห้อง ' + parsed.room + '</span>';

  if (!parsed.name && !parsed.number) {
    tagsWrap.innerHTML += '<span class="tag tag-nomatch">⚠ อ่านข้อความไม่ได้ กรุณาเลือกด้วยตนเอง</span>';
  }

  // Match นักเรียน
  var matched = findBestMatch(parsed);

  if (matched) {
    currentStudent = matched;
    showScorePopup(matched);
  } else {
    setStatus('ไม่พบนักเรียนที่ตรงกัน', 'error');
    document.getElementById('btnManual').style.display = 'block';
  }
}

// ================================================================
//  FUZZY MATCH
// ================================================================
function findBestMatch(parsed) {
  if (!students.length) return null;

  var best = null;
  var bestScore = 0;

  for (var i = 0; i < students.length; i++) {
    var s = students[i];
    var score = 0;

    // ── ชื่อ ──
    if (parsed.name && s.name) {
      var a = parsed.name.replace(/\s/g, '');
      var b = s.name.replace(/\s/g, '');
      if (a === b) {
        score += 20;
      } else if (b.indexOf(a) >= 0 || a.indexOf(b) >= 0) {
        score += 12;
      } else {
        var ov = charOverlapRatio(a, b);
        score += Math.round(ov * 10);
      }
    }

    // ── เลขที่ ──
    if (parsed.number && s.number) {
      if (s.number === parsed.number) score += 8;
    }

    // ── ห้อง ──
    if (parsed.room && s.room) {
      if (s.room === parsed.room) score += 4;
    }

    if (score > bestScore) {
      bestScore = score;
      best = s;
    }
  }

  // ต้องการ score ขั้นต่ำ
  return bestScore >= 8 ? best : null;
}

function charOverlapRatio(a, b) {
  if (!a || !b) return 0;
  var count = 0;
  for (var i = 0; i < a.length; i++) {
    if (b.indexOf(a[i]) >= 0) count++;
  }
  return count / Math.max(a.length, b.length);
}

// ================================================================
//  MANUAL SEARCH
// ================================================================
document.getElementById('btnManual').addEventListener('click', function() {
  showManualSearch(null);
});

function showManualSearch(hintParsed) {
  // สร้าง options ทั้งหมด
  var opts = '<option value="">-- เลือกนักเรียน --</option>';

  // ถ้ามี hint ให้แสดงผลที่ตรงห้องก่อน
  var list = students.slice();
  if (hintParsed && hintParsed.room) {
    list.sort(function(a, b) {
      var aMatch = a.room === hintParsed.room ? 0 : 1;
      var bMatch = b.room === hintParsed.room ? 0 : 1;
      if (aMatch !== bMatch) return aMatch - bMatch;
      return parseInt(a.number) - parseInt(b.number);
    });
  }

  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    opts += '<option value="' + s.id + '">' +
      s.name + '  (เลขที่ ' + s.number + '  ห้อง ' + s.room + ')' +
    '</option>';
  }

  Swal.fire({
    title: '<span style="font-family:Kanit,sans-serif;color:#1a237e">เลือกนักเรียน</span>',
    html:
      '<div style="font-family:Sarabun,sans-serif">' +
      '<p style="color:#78909c;font-size:.9rem;margin-bottom:12px">OCR อาจอ่านไม่ชัด กรุณาเลือกนักเรียนที่ถูกต้อง</p>' +
      '<select id="swal-select" style="width:100%;padding:10px 12px;border:2px solid #1a237e;' +
        'border-radius:10px;font-family:Sarabun,sans-serif;font-size:.95rem;outline:none">' +
      opts +
      '</select></div>',
    confirmButtonText:  '✓ เลือกนักเรียนนี้',
    cancelButtonText:   'ยกเลิก',
    showCancelButton:   true,
    confirmButtonColor: '#1a237e',
    cancelButtonColor:  '#90a4ae',
    focusConfirm: false,
    preConfirm: function() {
      var val = document.getElementById('swal-select').value;
      if (!val) { Swal.showValidationMessage('กรุณาเลือกนักเรียน'); return false; }
      for (var i = 0; i < students.length; i++) {
        if (students[i].id === val) return students[i];
      }
      return false;
    }
  }).then(function(res) {
    if (res.isConfirmed && res.value) {
      currentStudent = res.value;
      showScorePopup(res.value);
    }
  });
}

// ================================================================
//  SCORE POPUP
// ================================================================
function showScorePopup(student) {
  var subject = document.getElementById('subjectInput').value.trim() || 'คะแนน';

  Swal.fire({
    title: '<span style="font-family:Kanit,sans-serif;color:#1a237e;font-size:1.15rem">พบนักเรียน 🎉</span>',
    html:
      '<div style="font-family:Sarabun,sans-serif">' +
      
      // Student card
      '<div style="background:linear-gradient(135deg,#1a237e,#3949ab);border-radius:12px;' +
        'padding:16px;margin-bottom:16px;color:white;text-align:center">' +
      '<div style="font-size:1.45rem;font-weight:700;letter-spacing:.02em;margin-bottom:6px">' +
        student.name +
      '</div>' +
      '<div style="font-size:.85rem;opacity:.85;display:flex;justify-content:center;gap:16px">' +
        '<span>🆔 ' + student.id + '</span>' +
        '<span>🔢 เลขที่ ' + student.number + '</span>' +
        '<span>🏫 ห้อง ' + student.room + '</span>' +
      '</div>' +
      '</div>' +

      // Subject & score
      '<div style="text-align:left;margin-bottom:8px;font-size:.9rem;color:#555">' +
        '📚 วิชา: <b style="color:#1a237e">' + subject + '</b>' +
      '</div>' +
      '<input id="swal-score" type="number" min="0" max="100" step="0.5"' +
        ' placeholder="กรอกคะแนน"' +
        ' style="width:100%;padding:16px;border:2px solid #1a237e;border-radius:10px;' +
          'font-size:1.6rem;text-align:center;font-family:Sarabun,sans-serif;outline:none;' +
          'font-weight:700;color:#1a237e">' +
      '</div>',

    showCancelButton:   true,
    confirmButtonText:  '💾 บันทึกคะแนน',
    cancelButtonText:   'ยกเลิก',
    confirmButtonColor: '#1a237e',
    cancelButtonColor:  '#90a4ae',
    focusConfirm: false,

    preConfirm: function() {
      var val = document.getElementById('swal-score').value;
      if (val === '' || isNaN(parseFloat(val))) {
        Swal.showValidationMessage('กรุณากรอกคะแนนให้ถูกต้อง');
        return false;
      }
      var n = parseFloat(val);
      if (n < 0 || n > 100) {
        Swal.showValidationMessage('คะแนนต้องอยู่ระหว่าง 0 – 100');
        return false;
      }
      return n;
    },

    didOpen: function() {
      setTimeout(function() {
        var inp = document.getElementById('swal-score');
        if (inp) inp.focus();
      }, 200);
    }
  }).then(function(res) {
    if (res.isConfirmed) {
      doSaveScore(res.value, subject);
    }
  });
}

// ================================================================
//  SAVE SCORE
// ================================================================
function doSaveScore(score, subject) {
  Swal.fire({
    title: 'กำลังบันทึก...',
    allowOutsideClick: false,
    didOpen: function() { Swal.showLoading(); }
  });

  fetch(GAS_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      action:  'saveScore',
      id:      currentStudent.id,
      name:    currentStudent.name,
      number:  currentStudent.number,
      room:    currentStudent.room,
      score:   score,
      subject: subject
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) {
      Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: data.error, confirmButtonColor: '#1a237e' });
      return;
    }
    var modeText = data.mode === 'update' ? '(อัปเดตคะแนนเดิม)' : '(เพิ่มใหม่)';
    Swal.fire({
      icon: 'success',
      title: 'บันทึกสำเร็จ! ✓',
      html:
        '<div style="font-family:Sarabun,sans-serif">' +
        '<b style="font-size:1.1rem">' + currentStudent.name + '</b><br>' +
        'คะแนน: <b style="font-size:1.3rem;color:#1a237e">' + score + '</b> คะแนน<br>' +
        '<small style="color:#78909c">' + subject + ' ' + modeText + '</small>' +
        '</div>',
      confirmButtonColor: '#1a237e',
      timer: 3000,
      timerProgressBar: true
    });
    setStatus(currentStudent.name + ' บันทึก ' + score + ' คะแนน ✓', 'success');
  })
  .catch(function(err) {
    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message, confirmButtonColor: '#1a237e' });
  });
}

// ================================================================
//  HELPERS
// ================================================================
function setStatus(msg, type) {
  var bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status ' + (type || 'info');
  bar.style.display = 'block';
}

// ================================================================
//  INIT
// ================================================================
loadStudents();
</script>
</body>
</html>
