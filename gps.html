<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPS Track Recorder — โรงเรียนศึกษานารี</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-deep:#12203C;
    --gold:#C9A227;
    --gold-soft:#E8D48A;
    --route:#E03131;
    --bg:#F5F6F8;
    --card:#FFFFFF;
    --text:#1B2A4A;
    --muted:#6B7688;
    --green:#2F9E44;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Sarabun',sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;flex-direction:column;
  }

  /* ---------- Header ---------- */
  header{
    background:var(--navy);
    color:#fff;
    padding:10px 16px;
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
    z-index:1000;
    box-shadow:0 2px 8px rgba(18,32,60,.3);
  }
  header .logo{
    width:34px;height:34px;border-radius:50%;
    background:var(--gold);color:var(--navy);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;flex-shrink:0;
  }
  header .title{line-height:1.2}
  header .title b{font-size:15px;font-weight:700;display:block}
  header .title span{font-size:11px;color:var(--gold-soft)}
  #gpsBadge{
    margin-left:auto;font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:20px;
    background:rgba(255,255,255,.12);color:#cbd3e0;
    display:flex;align-items:center;gap:6px;
  }
  #gpsBadge .dot{width:8px;height:8px;border-radius:50%;background:#8a94a6}
  #gpsBadge.on .dot{background:#4ade80;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---------- Map ---------- */
  #map{flex:1;min-height:0;z-index:1}

  /* ---------- Bottom panel ---------- */
  #panel{
    background:var(--card);
    border-top:3px solid var(--gold);
    padding:12px 16px calc(14px + env(safe-area-inset-bottom));
    flex-shrink:0;z-index:1000;
    box-shadow:0 -4px 16px rgba(18,32,60,.12);
  }
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:8px;margin-bottom:12px;text-align:center;
  }
  .stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat .l{font-size:11px;color:var(--muted);font-weight:500}
  .btn{
    width:100%;border:none;border-radius:14px;
    padding:15px;font-family:inherit;font-size:17px;font-weight:700;
    cursor:pointer;transition:transform .1s, filter .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:scale(.98)}
  #btnStart{background:var(--navy);color:#fff}
  #btnStart:hover{filter:brightness(1.15)}
  #btnStop{background:var(--route);color:#fff;display:none}
  .trip-name{
    width:100%;margin-bottom:10px;
    border:1.5px solid #dde2ea;border-radius:10px;
    padding:10px 12px;font-family:inherit;font-size:14px;color:var(--text);
    background:#fafbfc;
  }
  .trip-name:focus{outline:none;border-color:var(--gold);background:#fff}
  #hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px}

  /* ---------- Summary overlay ---------- */
  #summary{
    position:fixed;inset:0;z-index:2000;
    background:rgba(18,32,60,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;
    padding:16px;overflow-y:auto;
  }
  #summary.show{display:flex}
  .sheet{
    background:var(--card);border-radius:18px;
    width:100%;max-width:420px;
    padding:16px;
    max-height:calc(100vh - 32px);overflow-y:auto;
    animation:up .25s ease;
  }
  @keyframes up{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
  .sheet h2{font-size:16px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:10px}
  #cardCanvas{
    width:100%;height:auto;border-radius:12px;display:block;
    box-shadow:0 4px 18px rgba(18,32,60,.25);
  }
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .actions .btn{padding:13px;font-size:15px;border-radius:12px}
  #btnDownload{background:var(--navy);color:#fff}
  #btnShare{background:var(--gold);color:var(--navy)}
  #btnClose{
    grid-column:1/-1;background:transparent;color:var(--muted);
    border:1.5px solid #dde2ea;
  }

  /* Leaflet marker tweaks */
  .start-pin,.finish-pin{
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;font-size:13px;font-weight:800;color:#fff;
    border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  .start-pin{background:var(--green)}
  .finish-pin{background:var(--gold);color:var(--navy)}
  .me-pin{
    width:16px;height:16px;border-radius:50%;
    background:#2b6cb0;border:3px solid #fff;
    box-shadow:0 0 0 6px rgba(43,108,176,.25);
  }
</style>
</head>
<body>

<header>
  <div class="logo">SNR</div>
  <div class="title">
    <b>GPS Track Recorder</b>
    <span>บันทึกเส้นทางการเดินทาง · โรงเรียนศึกษานารี</span>
  </div>
  <div id="gpsBadge"><span class="dot"></span><span id="gpsText">GPS ปิด</span></div>
</header>

<div id="map"></div>

<div id="panel">
  <input class="trip-name" id="tripName" type="text" placeholder="ชื่อการเดินทาง เช่น 🚶 เดินสำรวจโรงเรียน" maxlength="60">
  <div class="stats">
    <div class="stat"><div class="v" id="stDist">0.00</div><div class="l">ระยะทาง (km)</div></div>
    <div class="stat"><div class="v" id="stTime">00:00</div><div class="l">เวลา (นาที)</div></div>
    <div class="stat"><div class="v" id="stSpeed">0.0</div><div class="l">ความเร็วเฉลี่ย (km/h)</div></div>
  </div>
  <button class="btn" id="btnStart">▶ เริ่มเดินทาง (Start)</button>
  <button class="btn" id="btnStop">■ สิ้นสุดการเดินทาง (Stop)</button>
  <div id="hint">ต้องเปิดผ่าน HTTPS และอนุญาตการเข้าถึงตำแหน่ง · เปิดหน้าจอค้างไว้ระหว่างบันทึก</div>
</div>

<!-- Summary sheet -->
<div id="summary">
  <div class="sheet">
    <h2>สรุปการเดินทาง</h2>
    <div id="saveStatus" style="text-align:center;font-size:13px;font-weight:600;margin-bottom:10px;padding:8px;border-radius:8px;background:#f0f2f6;color:#6B7688;">⏳ กำลังบันทึกลง Google Sheet...</div>
    <canvas id="cardCanvas" width="1080" height="1350"></canvas>
    <div class="actions">
      <button class="btn" id="btnDownload">⬇ ดาวน์โหลดรูป</button>
      <button class="btn" id="btnShare">↗ แชร์</button>
      <button class="btn" id="btnClose">ปิด และเริ่มใหม่</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  'use strict';

  // ================= CONFIG =================
  // วาง URL ของ GAS Web App (Deploy > Web app > Anyone) ตรงนี้
  var GAS_URL = 'script.google.com/macros/s/AKfycbzQnhrspT3_4ZNKK0qgJSbl4PhY0hHxeuhOYpHad4if07epiMMB6BqWDlQ55GnjGwW1/exec';
  var SAVE_IMAGE_TO_DRIVE = true; // อัปโหลดรูป PNG เข้า Drive ด้วยหรือไม่

  // ================= Map =================
  var map = L.map('map',{zoomControl:true}).setView([13.7266,100.4900],16); // ศึกษานารี
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(map);

  var routeLine = L.polyline([],{color:'#E03131',weight:5,opacity:.9}).addTo(map);
  var meMarker=null, startMarker=null, finishMarker=null;

  // ================= State =================
  var recording=false, watchId=null, timerId=null, wakeLock=null;
  var points=[];            // {lat,lng,t}
  var totalDist=0;          // meters
  var startTime=0, endTime=0;

  var $=function(id){return document.getElementById(id)};

  // ================= Helpers =================
  function haversine(a,b){
    var R=6371000, rad=Math.PI/180;
    var dLat=(b.lat-a.lat)*rad, dLng=(b.lng-a.lng)*rad;
    var s=Math.sin(dLat/2)*Math.sin(dLat/2)+
          Math.cos(a.lat*rad)*Math.cos(b.lat*rad)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
    return 2*R*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
  }
  function fmtClock(d){
    return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  }
  function fmtDur(ms){
    var s=Math.floor(ms/1000);
    var h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
    if(h>0) return h+':'+('0'+m).slice(-2)+':'+('0'+ss).slice(-2);
    return ('0'+m).slice(-2)+':'+('0'+ss).slice(-2);
  }
  function updateStats(){
    $('stDist').textContent=(totalDist/1000).toFixed(2);
    var elapsed=(recording?Date.now():endTime)-startTime;
    if(startTime>0) $('stTime').textContent=fmtDur(elapsed);
    var hrs=elapsed/3600000;
    $('stSpeed').textContent=hrs>0?((totalDist/1000)/hrs).toFixed(1):'0.0';
  }

  // ================= Recording =================
  function onPos(pos){
    var c=pos.coords;
    if(c.accuracy>50) return; // ตัดจุดที่คลาดเคลื่อนมาก
    var p={lat:c.latitude,lng:c.longitude,t:Date.now()};

    if(points.length>0){
      var d=haversine(points[points.length-1],p);
      if(d<2) return;               // ยังไม่ขยับ (กัน GPS jitter)
      if(d>200) return;             // จุดกระโดดผิดปกติ
      totalDist+=d;
    }
    points.push(p);
    routeLine.addLatLng([p.lat,p.lng]);

    if(!meMarker){
      meMarker=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'me-pin',iconSize:[16,16]})}).addTo(map);
      startMarker=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'start-pin',html:'●',iconSize:[26,26]})}).addTo(map);
      map.setView([p.lat,p.lng],18);
    }else{
      meMarker.setLatLng([p.lat,p.lng]);
      map.panTo([p.lat,p.lng],{animate:true});
    }
    updateStats();
    $('gpsText').textContent='GPS ±'+Math.round(c.accuracy)+' m';
  }

  function onErr(e){
    var msg = e.code===1 ? 'กรุณาอนุญาตการเข้าถึงตำแหน่งในเบราว์เซอร์'
            : e.code===2 ? 'ไม่พบสัญญาณ GPS ลองออกไปที่โล่งแจ้ง'
            : 'ขอตำแหน่งหมดเวลา กำลังลองใหม่...';
    $('gpsText').textContent='GPS ผิดพลาด';
    if(e.code===1){ alert(msg); stop(true); }
  }

  function requestWakeLock(){
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(wl){wakeLock=wl;}).catch(function(){});
    }
  }

  function start(){
    if(!('geolocation' in navigator)){ alert('อุปกรณ์นี้ไม่รองรับ Geolocation'); return; }
    points=[]; totalDist=0; startTime=Date.now(); endTime=0;
    routeLine.setLatLngs([]);
    if(meMarker){map.removeLayer(meMarker);meMarker=null;}
    if(startMarker){map.removeLayer(startMarker);startMarker=null;}
    if(finishMarker){map.removeLayer(finishMarker);finishMarker=null;}

    recording=true;
    watchId=navigator.geolocation.watchPosition(onPos,onErr,{
      enableHighAccuracy:true, maximumAge:1000, timeout:15000
    });
    timerId=setInterval(updateStats,1000);
    requestWakeLock();

    $('btnStart').style.display='none';
    $('btnStop').style.display='flex';
    $('gpsBadge').classList.add('on');
    $('gpsText').textContent='กำลังบันทึก...';
    $('tripName').disabled=true;
  }

  function stop(silent){
    recording=false;
    if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
    if(timerId){clearInterval(timerId);timerId=null;}
    if(wakeLock){wakeLock.release().catch(function(){});wakeLock=null;}
    endTime=Date.now();

    $('btnStart').style.display='flex';
    $('btnStop').style.display='none';
    $('gpsBadge').classList.remove('on');
    $('gpsText').textContent='GPS ปิด';
    $('tripName').disabled=false;
    if(silent) return;

    if(points.length<2){ alert('ยังไม่มีข้อมูลเส้นทางเพียงพอ (ต้องมีอย่างน้อย 2 จุด)'); return; }

    // ปักหมุดจุดสิ้นสุด + fit เส้นทาง
    var last=points[points.length-1];
    finishMarker=L.marker([last.lat,last.lng],{icon:L.divIcon({className:'finish-pin',html:'★',iconSize:[26,26]})}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[40,40]});

    updateStats();
    drawCard();
    $('summary').classList.add('show');
    saveToSheet();
  }

  // ================= Save to Google Sheet =================
  function saveToSheet(){
    var st=$('saveStatus');
    if(!GAS_URL || GAS_URL.indexOf('XXXXXXXX')>-1){
      st.textContent='⚠ ยังไม่ได้ตั้งค่า GAS_URL — ไม่ได้บันทึกลง Sheet';
      st.style.background='#fff4e0'; st.style.color='#b7791f';
      return;
    }
    st.textContent='⏳ กำลังบันทึกลง Google Sheet...';
    st.style.background='#f0f2f6'; st.style.color='#6B7688';

    var payload={
      tripName: $('tripName').value.trim()||'บันทึกการเดินทาง',
      distanceKm: +(totalDist/1000).toFixed(3),
      durationText: fmtDur(endTime-startTime),
      durationMs: endTime-startTime,
      avgSpeed: +(((totalDist/1000)/((endTime-startTime)/3600000))||0).toFixed(2),
      startTime: new Date(startTime).toISOString(),
      endTime: new Date(endTime).toISOString(),
      pointCount: points.length,
      // ปัดทศนิยม 6 ตำแหน่ง (~11 ซม.) เพื่อลดขนาดข้อมูล
      points: points.map(function(p){return [+p.lat.toFixed(6),+p.lng.toFixed(6),p.t];}),
      image: null
    };

    function send(){
      // ใช้ text/plain เพื่อเลี่ยง CORS preflight ของ GAS
      fetch(GAS_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(payload)
      })
      .then(function(r){return r.json();})
      .then(function(res){
        if(res.status==='ok'){
          st.textContent='✔ บันทึกลง Google Sheet เรียบร้อย';
          st.style.background='#e6f7ec'; st.style.color='#2F9E44';
        }else{ throw new Error(res.message||'unknown'); }
      })
      .catch(function(err){
        st.textContent='✖ บันทึกไม่สำเร็จ: '+err.message;
        st.style.background='#fdecec'; st.style.color='#E03131';
      });
    }

    if(SAVE_IMAGE_TO_DRIVE){
      payload.image=$('cardCanvas').toDataURL('image/png').split(',')[1];
      send();
    }else{
      send();
    }
  }

  $('btnStart').addEventListener('click',start);
  $('btnStop').addEventListener('click',function(){stop(false);});

  // ================= PNG Summary Card =================
  function drawCard(){
    var cv=$('cardCanvas'), ctx=cv.getContext('2d');
    var W=cv.width, H=cv.height;

    // พื้นหลัง Navy
    var bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#1B2A4A'); bg.addColorStop(1,'#12203C');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // เส้นทองบน-ล่าง
    ctx.fillStyle='#C9A227';
    ctx.fillRect(0,0,W,14); ctx.fillRect(0,H-14,W,14);

    var name=$('tripName').value.trim()||'บันทึกการเดินทาง';
    var distKm=(totalDist/1000).toFixed(2);
    var dur=fmtDur(endTime-startTime);
    var hrs=(endTime-startTime)/3600000;
    var speed=hrs>0?((totalDist/1000)/hrs).toFixed(1):'0.0';

    ctx.textAlign='center';
    // ชื่อทริป
    ctx.fillStyle='#FFFFFF';
    ctx.font='800 58px Sarabun';
    ctx.fillText(name,W/2,120,W-120);
    // วันที่
    ctx.fillStyle='#E8D48A';
    ctx.font='500 34px Sarabun';
    ctx.fillText(new Date(startTime).toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),W/2,175);

    // สถิติ 3 ช่อง
    var stats=[[distKm,'ระยะทาง (km)'],[dur,'เวลา (นาที)'],[speed,'เฉลี่ย (km/h)']];
    var colW=W/3;
    for(var i=0;i<3;i++){
      var cx=colW*i+colW/2;
      ctx.fillStyle='#FFFFFF'; ctx.font='800 72px Sarabun';
      ctx.fillText(stats[i][0],cx,300);
      ctx.fillStyle='#8a94a6'; ctx.font='500 30px Sarabun';
      ctx.fillText(stats[i][1],cx,345);
    }
    // เส้นคั่นทอง
    ctx.strokeStyle='rgba(201,162,39,.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(80,400); ctx.lineTo(W-80,400); ctx.stroke();

    // ===== วาดเส้นทาง (normalize ลงกรอบ) =====
    var box={x:110,y:450,w:W-220,h:620};
    // กรอบพื้นอ่อน
    ctx.fillStyle='rgba(255,255,255,.05)';
    roundRect(ctx,box.x-30,box.y-30,box.w+60,box.h+60,24); ctx.fill();

    var lats=points.map(function(p){return p.lat});
    var lngs=points.map(function(p){return p.lng});
    var minLa=Math.min.apply(null,lats), maxLa=Math.max.apply(null,lats);
    var minLo=Math.min.apply(null,lngs), maxLo=Math.max.apply(null,lngs);
    var midLa=(minLa+maxLa)/2;
    var mPerDegLat=111320;
    var mPerDegLng=111320*Math.cos(midLa*Math.PI/180);
    var spanX=Math.max((maxLo-minLo)*mPerDegLng,1);
    var spanY=Math.max((maxLa-minLa)*mPerDegLat,1);
    var scale=Math.min(box.w/spanX, box.h/spanY);
    var offX=box.x+(box.w-spanX*scale)/2;
    var offY=box.y+(box.h-spanY*scale)/2;
    function toXY(p){
      return {
        x: offX+(p.lng-minLo)*mPerDegLng*scale,
        y: offY+(maxLa-p.lat)*mPerDegLat*scale
      };
    }
    // เส้นแดง
    ctx.strokeStyle='#E03131'; ctx.lineWidth=9;
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath();
    points.forEach(function(p,i){
      var q=toXY(p);
      if(i===0)ctx.moveTo(q.x,q.y); else ctx.lineTo(q.x,q.y);
    });
    ctx.stroke();
    // จุดเริ่ม ● เขียว
    var s=toXY(points[0]);
    ctx.fillStyle='#2F9E44';
    ctx.beginPath(); ctx.arc(s.x,s.y,18,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.stroke();
    // จุดจบ ★ ทอง
    var f=toXY(points[points.length-1]);
    drawStar(ctx,f.x,f.y,24,'#C9A227');

    // Start / Finish times
    ctx.textAlign='left';
    ctx.fillStyle='#2F9E44'; ctx.font='700 36px Sarabun';
    ctx.fillText('● Start',110,1180);
    ctx.fillStyle='#fff'; ctx.font='600 36px Sarabun';
    ctx.fillText(fmtClock(new Date(startTime)),260,1180);
    ctx.fillStyle='#C9A227'; ctx.font='700 36px Sarabun';
    ctx.fillText('★ Finish',110,1240);
    ctx.fillStyle='#fff'; ctx.font='600 36px Sarabun';
    ctx.fillText(fmtClock(new Date(endTime)),290,1240);

    // เครดิต
    ctx.textAlign='right';
    ctx.fillStyle='#8a94a6'; ctx.font='500 26px Sarabun';
    ctx.fillText('SNR GPS Track Recorder · โรงเรียนศึกษานารี',W-90,1240);
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function drawStar(ctx,cx,cy,r,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    for(var i=0;i<10;i++){
      var rad=(i%2===0)?r:r*.45;
      var a=Math.PI/5*i-Math.PI/2;
      var x=cx+rad*Math.cos(a), y=cy+rad*Math.sin(a);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
  }

  // ================= Download / Share =================
  function fileName(){
    var d=new Date(startTime);
    return 'track_'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'_'+fmtClock(d).replace(':','')+'.png';
  }
  $('btnDownload').addEventListener('click',function(){
    $('cardCanvas').toBlob(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=fileName();
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href)},2000);
    },'image/png');
  });
  $('btnShare').addEventListener('click',function(){
    $('cardCanvas').toBlob(function(blob){
      var file=new File([blob],fileName(),{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:$('tripName').value||'บันทึกการเดินทาง'}).catch(function(){});
      }else{
        alert('อุปกรณ์นี้ไม่รองรับการแชร์ไฟล์ กรุณาใช้ปุ่มดาวน์โหลดรูปแทน');
      }
    },'image/png');
  });
  $('btnClose').addEventListener('click',function(){
    $('summary').classList.remove('show');
  });

  // โหลดฟอนต์ Sarabun ให้ canvas ใช้ได้ก่อนวาด
  if(document.fonts && document.fonts.load){
    document.fonts.load('800 58px Sarabun');
    document.fonts.load('500 30px Sarabun');
  }
})();
</script>
</body>
</html>
